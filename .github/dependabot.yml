version: 2
updates:
  # Dart/Flutter dependencies from pubspec.yaml.
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 */5 * * *"
      timezone: "Asia/Tashkent"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "dart"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "[UPD]"
      include: "scope"

  # GitHub Actions updates (including pinned SHAs in workflows).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 */5 * * *"
      timezone: "Asia/Tashkent"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "[UPD]"
      include: "scope"
